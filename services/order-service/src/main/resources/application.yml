server:
  port: 8081

spring:
  application:
    name: order-service

order:
  processing-delay-ms: 0

payment:
  service-url: http://localhost:8082

demo:
  api-key: ${DEMO_API_KEY:test-key}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317