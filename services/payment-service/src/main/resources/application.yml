server:
  port: 8082

spring:
  application:
    name: payment-service

payment:
  failure-rate: 0.0

demo:
  api-key: ${DEMO_API_KEY:test-key}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: http://localhost:4317